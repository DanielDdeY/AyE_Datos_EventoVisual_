<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <div style="width: 300px; margin: 100px auto; text-align: center">
      <h2>Crear Cuenta</h2>
      <form id="registroForm">
        <input
          type="text"
          id="nombre"
          placeholder="Nombre Completo"
          required
        /><br /><br />
        <input
          type="email"
          id="email"
          placeholder="Correo Electrónico"
          required
        /><br /><br />
        <input
          type="password"
          id="contrasena"
          placeholder="Contraseña"
          required
        /><br /><br />

        <label for="perfilInicial">Perfil:</label><br />
        <select id="perfilInicial" required>
          <option value="USUARIO">Usuario Normal</option>
          <option value="ADMINISTRADOR">Administrador</option></select
        ><br /><br />

        <button type="submit">Registrarme</button>
      </form>
      <p id="registro-msg" style="display: none"></p>
      <br />
      <a href="login.html">Volver al Login</a>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
