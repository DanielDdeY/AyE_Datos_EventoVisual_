<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Project Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
              400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
              800: '#3730a3', 900: '#312e81'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-slate-50 text-slate-800 antialiased">
  <div id="app"></div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="fixed inset-0 z-[9000] bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4">
    <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto w-full max-w-lg animate-modal-in"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
